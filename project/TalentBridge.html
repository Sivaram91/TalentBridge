<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentBridge</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-w: 220px;
    --fg: #18181a;
    --fg-inv: #ffffff;
    --muted-fg: #7a7878;
    --surface: #ffffff;
    --surface-2: #f4f3f1;
    --border: #e6e4df;
    --sidebar-bg: #111318;
    --sidebar-fg: #e8e6e1;
    --sidebar-muted: #666872;
    --sidebar-hover: rgba(255,255,255,0.06);
    --sidebar-active: rgba(255,255,255,0.1);
    --accent: oklch(52% 0.16 240);
    --accent-bg: oklch(96% 0.04 240);
    --blue: oklch(52% 0.16 240);
    --blue-bg: oklch(96% 0.04 240);
    --green: oklch(48% 0.14 148);
    --green-bg: oklch(95% 0.04 148);
    --amber: oklch(58% 0.14 72);
    --amber-bg: oklch(96% 0.04 72);
    --red: oklch(52% 0.16 22);
    --red-bg: oklch(96% 0.04 22);
    --teal: oklch(52% 0.14 195);
    --teal-bg: oklch(96% 0.04 195);
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    background: #0e0f13;
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  #root { height: 100vh; display: flex; }

  /* ── Sidebar ───────────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    border-right: 1px solid rgba(255,255,255,0.06);
    height: 100vh;
    overflow: hidden;
  }

  .sidebar-logo {
    padding: 20px 18px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }

  .sidebar-logo-mark {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 14px;
    font-weight: 700;
    color: var(--sidebar-fg);
    letter-spacing: -0.01em;
  }

  .sidebar-section {
    padding: 14px 10px 6px;
    flex: 1;
    overflow-y: auto;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--sidebar-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 0 8px;
    margin-bottom: 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--sidebar-muted);
    transition: all 0.12s;
    margin-bottom: 1px;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    position: relative;
  }

  .nav-item:hover { background: var(--sidebar-hover); color: var(--sidebar-fg); }

  .nav-item.active {
    background: var(--sidebar-active);
    color: var(--sidebar-fg);
  }

  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 4px; bottom: 4px;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
    margin-left: -2px;
  }

  .nav-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.8; }

  .nav-badge {
    margin-left: auto;
    font-size: 10px;
    font-weight: 600;
    background: rgba(255,255,255,0.1);
    color: var(--sidebar-muted);
    padding: 1px 6px;
    border-radius: 99px;
    font-family: var(--mono);
  }

  .sidebar-footer {
    padding: 12px 10px;
    border-top: 1px solid rgba(255,255,255,0.07);
    font-size: 11px;
    color: var(--sidebar-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── Main content ──────────────────────────────────── */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--surface-2);
    overflow: hidden;
  }

  .topbar {
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
    flex-shrink: 0;
  }

  .topbar-breadcrumb {
    font-size: 12px;
    color: var(--muted-fg);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .topbar-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--fg);
  }

  .topbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    color: var(--muted-fg);
    font-family: var(--mono);
  }

  .scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
  }

  /* ── Screen layout ─────────────────────────────────── */
  .screen-content { width: 100%; }

  .screen-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 16px;
  }

  .screen-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--fg);
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  .screen-sub {
    font-size: 13px;
    color: var(--muted-fg);
    margin-top: 3px;
  }

  /* ── Company grid ──────────────────────────────────── */
  .company-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 10px;
  }

  .company-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .company-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
    transform: translateY(-1px);
  }

  .company-logo {
    width: 34px;
    height: 34px;
    background: var(--surface-2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted-fg);
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }

  .card-stat { display: flex; flex-direction: column; }
  .card-stat-val { font-size: 18px; font-weight: 700; font-family: var(--mono); color: var(--fg); line-height: 1; }
  .card-stat-label { font-size: 10px; color: var(--muted-fg); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }

  /* ── Job rows ──────────────────────────────────────── */
  .job-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 4px;
    transition: border-color 0.12s;
  }

  .job-row:hover { border-color: var(--accent); }

  .job-expired { opacity: 0.55; }

  /* ── Buttons ───────────────────────────────────────── */
  .btn-outline {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 13px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--fg);
    cursor: pointer;
    text-decoration: none;
    transition: all 0.12s;
    font-family: var(--sans);
  }

  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    background: transparent;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted-fg);
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.12s;
  }

  .btn-ghost:hover { color: var(--fg); border-color: var(--fg); }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border: none;
    background: transparent;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted-fg);
    cursor: pointer;
    font-family: var(--sans);
    border-radius: 5px;
    transition: color 0.12s;
  }

  .back-btn:hover { color: var(--fg); }

  /* ── Upload zone ───────────────────────────────────── */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 28px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 12px;
  }

  .upload-zone:hover, .upload-zone.dragging {
    border-color: var(--accent);
    background: var(--accent-bg);
  }

  /* ── Table ─────────────────────────────────────────── */
  .table-link:hover { color: var(--accent); text-decoration: underline; }

  /* ── Scrollbar ─────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  input, select, button { font-family: var(--sans); }

  /* ── Groups ─────────────────────────────────────────── */
  .group-nav-item:hover .group-edit-btn { opacity: 1 !important; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.12s ease;
  }
  .modal-box {
    background: var(--surface); border-radius: 12px; width: 540px;
    max-height: 82vh; display: flex; flex-direction: column;
    box-shadow: 0 24px 64px rgba(0,0,0,0.28), 0 0 0 1px rgba(0,0,0,0.08);
    animation: slideUp 0.14s ease;
  }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  @keyframes slideUp { from { transform:translateY(8px);opacity:0 } to { transform:none;opacity:1 } }
  .co-picker-row {
    display:flex; align-items:center; gap:10px; padding:7px 8px;
    border-radius:6px; cursor:pointer; transition:background 0.1s; margin-bottom:2px;
    user-select:none;
  }
  .co-picker-row:hover { background: var(--surface-2); }
  .co-picker-row.selected { background: var(--accent-bg); }
</style>
</head>
<body>
<div id="root"></div>

<script src="tb-data.js"></script>
<script type="text/babel" src="tb-screens.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">


const { useState, useEffect } = React;

const DEFAULT_GROUPS = [
{ id: 'g1', name: 'AI / ML', companyIds: [1, 10, 11, 25, 35] },
{ id: 'g2', name: 'Robotics', companyIds: [14, 31] }];


// ── GroupModal ────────────────────────────────────────────────────
function GroupModal({ group, onSave, onDelete, onClose }) {
  const [name, setName] = useState(group ? group.name : '');
  const [selected, setSelected] = useState(new Set(group ? group.companyIds : []));
  const [search, setSearch] = useState('');

  function toggle(id) {
    setSelected((prev) => {const s = new Set(prev);s.has(id) ? s.delete(id) : s.add(id);return s;});
  }

  const visible = TB_COMPANIES.filter((c) =>
  c.name.toLowerCase().includes(search.toLowerCase()) ||
  c.industry.toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="modal-box">
        {/* Header */}
        <div style={{ padding: '22px 24px 16px', borderBottom: '1px solid var(--border)' }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--fg)', marginBottom: 14 }}>
            {group ? 'Edit Group' : 'New Group'}
          </div>
          <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Group name…" autoFocus
          style={{ width: '100%', padding: '8px 12px', border: '1px solid var(--border)', borderRadius: 7,
            fontSize: 14, fontWeight: 500, color: 'var(--fg)', background: 'var(--surface)',
            outline: 'none', boxSizing: 'border-box' }} />
        </div>

        {/* Picker header */}
        <div style={{ padding: '14px 24px 8px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span style={{ fontSize: 11, fontWeight: 600, color: 'var(--muted-fg)', textTransform: 'uppercase', letterSpacing: '0.06em' }}>
            Companies &nbsp;<span style={{ fontWeight: 400 }}>({selected.size} selected)</span>
          </span>
          <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Filter…"
          style={{ width: 140, padding: '4px 10px', border: '1px solid var(--border)', borderRadius: 5,
            fontSize: 12, color: 'var(--fg)', background: 'var(--surface-2)', outline: 'none' }} />
        </div>

        {/* Scrollable list */}
        <div style={{ flex: 1, overflowY: 'auto', padding: '8px 16px 12px' }}>
          {visible.map((c) =>
          <label key={c.id} className={`co-picker-row ${selected.has(c.id) ? 'selected' : ''}`}
          onClick={() => toggle(c.id)}>
              <input type="checkbox" readOnly checked={selected.has(c.id)}
            style={{ accentColor: 'var(--accent)', width: 14, height: 14, cursor: 'pointer', flexShrink: 0 }} />
              <span style={{ fontSize: 13, fontWeight: 500, color: 'var(--fg)', flex: 1 }}>{c.name}</span>
              <span style={{ fontSize: 11, color: 'var(--muted-fg)' }}>{c.industry}</span>
              <span style={{ fontSize: 11, color: 'var(--muted-fg)', fontFamily: 'var(--mono)', marginLeft: 8 }}>{c.activeJobCount} jobs</span>
            </label>
          )}
          {visible.length === 0 && <div style={{ padding: '24px', textAlign: 'center', color: 'var(--muted-fg)', fontSize: 13 }}>No companies match.</div>}
        </div>

        {/* Footer */}
        <div style={{ padding: '14px 24px', borderTop: '1px solid var(--border)', display: 'flex', gap: 8, alignItems: 'center' }}>
          {group &&
          <button onClick={() => onDelete(group.id)}
          style={{ fontSize: 13, color: 'var(--red)', background: 'transparent', border: '1px solid var(--red-bg)', padding: '7px 12px', borderRadius: 6, cursor: 'pointer' }}>
              Delete Group
            </button>
          }
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
            <button onClick={onClose}
            style={{ fontSize: 13, color: 'var(--muted-fg)', background: 'transparent', border: '1px solid var(--border)', padding: '7px 14px', borderRadius: 6, cursor: 'pointer' }}>
              Cancel
            </button>
            <button onClick={() => onSave({ name: name.trim(), companyIds: [...selected] })} disabled={!name.trim()}
            style={{ fontSize: 13, fontWeight: 600, color: 'white', background: 'var(--accent)', border: 'none', padding: '7px 16px', borderRadius: 6, cursor: 'pointer', opacity: name.trim() ? 1 : 0.4 }}>
              {group ? 'Save Changes' : 'Create Group'}
            </button>
          </div>
        </div>
      </div>
    </div>);

}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "sidebarWidth": 200,
  "accentHue": 135
} /*EDITMODE-END*/;

// ── Sidebar ──────────────────────────────────────────────────────
function Sidebar({ screen, onNav, tweaks, groups, activeGroup, onGroupChange, onNewGroup, onEditGroup, weeks, selectedWeek, onWeekChange }) {
  const decidedTotal = TB_DECIDED_JOBS.length;

  const navItems = [
  { id: 'companies', label: 'Companies', icon: Icons.companies },
  { id: 'cv', label: 'CV Manager', icon: Icons.cv },
  { id: 'tracker', label: 'App Tracker', icon: Icons.tracker, badge: decidedTotal },
  { id: 'report', label: 'Weekly Report', icon: Icons.report }];


  return (
    <div className="sidebar" style={{ width: tweaks.sidebarWidth }}>
      <div className="sidebar-logo">
        <div className="sidebar-logo-mark">
          <div className="logo-icon">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 10L7 3l5 7H2z" fill="white" fillOpacity="0.9" />
            </svg>
          </div>
          <span className="logo-text">TalentBridge</span>
        </div>
      </div>

      <div className="sidebar-section">
        <div className="sidebar-label" style={{ marginBottom: 8 }}>Navigation</div>
        {navItems.map((item) =>
        <button key={item.id} className={`nav-item ${screen === item.id || screen === 'company' && item.id === 'companies' ? 'active' : ''}`}
        onClick={() => {onNav(item.id);if (item.id !== 'companies') onGroupChange(null);if (item.id === 'report') onWeekChange(0);}}>
            <item.icon />
            <span>{item.label}</span>
            {item.badge != null && <span className="nav-badge">{item.badge}</span>}
          </button>
        )}

        

        {/* Groups */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 8px', marginTop: 18, marginBottom: 5 }}>
          <div className="sidebar-label" style={{ margin: 0 }}>Groups</div>
          <button onClick={onNewGroup} title="New group"
          style={{ background: 'transparent', border: 'none', color: 'var(--sidebar-muted)', cursor: 'pointer', padding: '1px', display: 'flex', alignItems: 'center', borderRadius: 3, lineHeight: 1 }}>
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1.5v10M1.5 6.5h10" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" /></svg>
          </button>
        </div>

        <button className={`nav-item ${screen === 'companies' && !activeGroup ? 'active' : ''}`}
        onClick={() => {onNav('companies');onGroupChange(null);}}>
          <svg className="nav-icon" viewBox="0 0 16 16" fill="none">
            <rect x="1.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" strokeWidth="1.3" />
            <rect x="9.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" strokeWidth="1.3" />
            <rect x="1.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" strokeWidth="1.3" />
            <rect x="9.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" strokeWidth="1.3" />
          </svg>
          <span>All Companies</span>
          <span className="nav-badge">{TB_COMPANIES.length}</span>
        </button>

        {groups.map((g) =>
        <button key={g.id}
        className={`nav-item group-nav-item ${activeGroup?.id === g.id && screen === 'companies' ? 'active' : ''}`}
        onClick={() => {onNav('companies');onGroupChange(g);}}>
            <svg className="nav-icon" viewBox="0 0 16 16" fill="none">
              <path d="M1 5.5h14M1 5.5C1 4 2 3 3.5 3h9C14 3 15 4 15 5.5v7c0 1.5-1 2.5-2.5 2.5h-9C2 15 1 14 1 12.5v-7z" stroke="currentColor" strokeWidth="1.3" />
            </svg>
            <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', textAlign: 'left' }}>{g.name}</span>
            <span className="nav-badge">{g.companyIds.length}</span>
            <button className="group-edit-btn"
          onClick={(e) => {e.stopPropagation();onEditGroup(g);}}
          title="Edit group"
          style={{ background: 'transparent', border: 'none', color: 'var(--sidebar-muted)', cursor: 'pointer',
            padding: '1px 3px', opacity: 0, transition: 'opacity 0.1s', display: 'flex', alignItems: 'center', marginLeft: 2 }}>
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M8 2l2 2-6 6H2V8L8 2z" stroke="currentColor" strokeWidth="1.2" strokeLinejoin="round" /></svg>
            </button>
          </button>
        )}

{/* Groups */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 8px', marginTop: 18, marginBottom: 5 }}>
          <div className="sidebar-label" style={{ margin: 0 }}>Groups</div>
          <button onClick={onNewGroup} title="New group"
          style={{ background: 'transparent', border: 'none', color: 'var(--sidebar-muted)', cursor: 'pointer', padding: '1px', display: 'flex', alignItems: 'center', borderRadius: 3, lineHeight: 1 }}>
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1.5v10M1.5 6.5h10" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" /></svg>
          </button>
        </div>

        <button className={`nav-item ${screen === 'companies' && !activeGroup ? 'active' : ''}`}
        onClick={() => {onNav('companies');onGroupChange(null);}}>
          <svg className="nav-icon" viewBox="0 0 16 16" fill="none">
            <rect x="1.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" strokeWidth="1.3" />
            <rect x="9.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" strokeWidth="1.3" />
            <rect x="1.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" strokeWidth="1.3" />
            <rect x="9.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" strokeWidth="1.3" />
          </svg>
          <span>All Companies</span>
          <span className="nav-badge">{TB_COMPANIES.length}</span>
        </button>

        {groups.map((g) =>
        <button key={g.id}
        className={`nav-item group-nav-item ${activeGroup?.id === g.id && screen === 'companies' ? 'active' : ''}`}
        onClick={() => {onNav('companies');onGroupChange(g);}}>
            <svg className="nav-icon" viewBox="0 0 16 16" fill="none">
              <path d="M1 5.5h14M1 5.5C1 4 2 3 3.5 3h9C14 3 15 4 15 5.5v7c0 1.5-1 2.5-2.5 2.5h-9C2 15 1 14 1 12.5v-7z" stroke="currentColor" strokeWidth="1.3" />
            </svg>
            <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', textAlign: 'left' }}>{g.name}</span>
            <span className="nav-badge">{g.companyIds.length}</span>
            <button className="group-edit-btn"
          onClick={(e) => {e.stopPropagation();onEditGroup(g);}}
          title="Edit group"
          style={{ background: 'transparent', border: 'none', color: 'var(--sidebar-muted)', cursor: 'pointer',
            padding: '1px 3px', opacity: 0, transition: 'opacity 0.1s', display: 'flex', alignItems: 'center', marginLeft: 2 }}>
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M8 2l2 2-6 6H2V8L8 2z" stroke="currentColor" strokeWidth="1.2" strokeLinejoin="round" /></svg>
            </button>
          </button>
        )}

        {/* Weekly report sub-weeks */}
        {screen === 'report' && weeks &&
        <div style={{ marginLeft: 14, borderLeft: '1px solid rgba(255,255,255,0.08)', paddingLeft: 8, marginTop: 2, marginBottom: 4 }}>
            {weeks.map((w, i) =>
          <button key={`${w.year}-${w.week}`}
          onClick={() => onWeekChange(i)}
          className={`nav-item ${selectedWeek === i ? 'active' : ''}`}
          style={{ padding: '5px 8px', fontSize: 11, marginBottom: 1 }}>
                <span style={{ fontFamily: 'var(--mono)', fontWeight: 600, minWidth: 32 }}>CW{String(w.week).padStart(2, '0')}</span>
                <span style={{ color: 'var(--sidebar-muted)', fontSize: 10 }}>{fmtShort(w.monday)}–{fmtShort(w.sunday)}</span>
                {w.isCurrent && <span style={{ marginLeft: 'auto', fontSize: 9, fontWeight: 700, color: 'var(--green)' }}>●</span>}
              </button>
          )}
          </div>
        }
      </div>

      <div className="sidebar-footer">
        <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--green)', display: 'inline-block', flexShrink: 0 }}></span>
        localhost:7823
      </div>
    </div>);

}

// ── Nav icons ────────────────────────────────────────────────────
const Icons = {
  companies: () =>
  <svg className="nav-icon" viewBox="0 0 16 16" fill="none">
      <rect x="1" y="5" width="4" height="10" rx="1" stroke="currentColor" strokeWidth="1.3" />
      <rect x="6" y="2" width="4" height="13" rx="1" stroke="currentColor" strokeWidth="1.3" />
      <rect x="11" y="7" width="4" height="8" rx="1" stroke="currentColor" strokeWidth="1.3" />
    </svg>,

  cv: () =>
  <svg className="nav-icon" viewBox="0 0 16 16" fill="none">
      <rect x="2" y="1" width="10" height="14" rx="1.5" stroke="currentColor" strokeWidth="1.3" />
      <path d="M5 5h6M5 7.5h6M5 10h4" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" />
      <path d="M12 1l2 2" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" />
    </svg>,

  tracker: () =>
  <svg className="nav-icon" viewBox="0 0 16 16" fill="none">
      <path d="M1 12l4-4 3 3 4-5 3 2" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" />
      <path d="M1 15h14" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" />
    </svg>,

  report: () =>
  <svg className="nav-icon" viewBox="0 0 16 16" fill="none">
      <rect x="1" y="3" width="14" height="12" rx="1.5" stroke="currentColor" strokeWidth="1.3" />

      <path d="M5 1v3M11 1v3" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" />

// ── Top bar ──────────────────────────────────────────────────────
const SCREEN_LABELS = {
  companies: 'Company Overview',
  company: 'Company Detail',
  cv: 'CV Manager',
  tracker: 'Companies',
  report: 'Weekly Report'
};

function TopBar({ screen, company }) {
  const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  const [time, setTime] = useState(now);
  useEffect(() => {
    const t = setInterval(() => setTime(new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })), 10000);
    return () => clearInterval(t);
  }, []);

  return (
    <div className="topbar">
      <div className="topbar-breadcrumb">
        <span>TalentBridge</span>
        <span style={{ opacity: 0.4 }}>/</span>
        <span className="topbar-title">{screen === 'company' && company ? company.name : SCREEN_LABELS[screen]}</span>
      </div>
      <div className="topbar-right">
        <span>{TB_COMPANIES.filter((c) => c.scrapeStatus === 'success').length}/{TB_COMPANIES.length} scraped</span>
        <span style={{ opacity: 0.3 }}>·</span>
        <span>{time}</span>
      </div>
    </div>);

}

// ── App ──────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('companies');
  const [selectedCompany, setSelectedCompany] = useState(null);
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [groups, setGroups] = useState(DEFAULT_GROUPS);
  const [activeGroup, setActiveGroup] = useState(null);
  const [groupModal, setGroupModal] = useState(null);
  const [weeks] = useState(() => buildWeeks(16));
  const [selectedWeek, setSelectedWeek] = useState(0); // null | 'new' | groupObject

  function handleNav(s) {setScreen(s);setSelectedCompany(null);}
  function handleSelectCompany(c) {setSelectedCompany(c);setScreen('company');}
  function handleBack() {setScreen('companies');setSelectedCompany(null);}

  function handleSaveGroup({ name, companyIds }) {
    if (groupModal === 'new') {
      const ng = { id: 'g' + Date.now(), name, companyIds };
      setGroups((prev) => [...prev, ng]);
      setActiveGroup(ng);
    } else {
      const updated = { ...groupModal, name, companyIds };
      setGroups((prev) => prev.map((g) => g.id === groupModal.id ? updated : g));
      if (activeGroup?.id === groupModal.id) setActiveGroup(updated);
    }
    setGroupModal(null);
  }

  function handleDeleteGroup(id) {
    setGroups((prev) => prev.filter((g) => g.id !== id));
    if (activeGroup?.id === id) setActiveGroup(null);
    setGroupModal(null);
  }

  const paddingMap = { compact: '16px 24px', normal: '28px 32px', comfortable: '40px 44px' };
  const padding = paddingMap[tweaks.density] || paddingMap.normal;

  useEffect(() => {
    document.documentElement.style.setProperty('--accent', `oklch(52% 0.16 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--accent-bg', `oklch(96% 0.04 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--blue', `oklch(52% 0.16 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--blue-bg', `oklch(96% 0.04 ${tweaks.accentHue})`);
  }, [tweaks.accentHue]);

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar screen={screen} onNav={handleNav} tweaks={tweaks}
      groups={groups} activeGroup={activeGroup}
      onGroupChange={setActiveGroup}
      onNewGroup={() => setGroupModal('new')}
      onEditGroup={(g) => setGroupModal(g)}
      weeks={weeks} selectedWeek={selectedWeek} onWeekChange={setSelectedWeek} />
      <div className="main-area">
        <TopBar screen={screen} company={selectedCompany} activeGroup={activeGroup} />
        <div className="scroll-area" style={{ padding, width: "1200px" }}>
          {screen === 'companies' && <CompanyOverview onSelectCompany={handleSelectCompany} activeGroup={activeGroup} />}
          {screen === 'company' && selectedCompany && <CompanyView company={selectedCompany} onBack={handleBack} />}          {screen === 'cv' && <CVManager />}
          {screen === 'tracker' && <ApplicationTracker />}
          {screen === 'report' && <WeeklyReport selectedWeek={selectedWeek} weeks={weeks} />}
        </div>
      </div>
      {groupModal &&
      <GroupModal
        group={groupModal === 'new' ? null : groupModal}
        onSave={handleSaveGroup}
        onDelete={handleDeleteGroup}
        onClose={() => setGroupModal(null)} />
      }

      <TweaksPanel title="Tweaks">
        <TweakSection label="Layout">
          <TweakRadio id="density" label="Density" options={['compact', 'normal', 'comfortable']}
          value={tweaks.density} onChange={(v) => setTweak('density', v)} />
          <TweakSlider id="sidebarWidth" label="Sidebar width" min={180} max={280} step={10}
          value={tweaks.sidebarWidth} onChange={(v) => setTweak('sidebarWidth', v)} />
        </TweakSection>
        <TweakSection label="Color">
          <TweakSlider id="accentHue" label="Accent hue" min={0} max={360} step={5}
          value={tweaks.accentHue} onChange={(v) => setTweak('accentHue', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>);

}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
